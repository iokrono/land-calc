<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8F00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6D00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <circle cx="256" cy="256" r="225"
          fill="none"
          stroke="url(#glowGrad)"
          stroke-width="30"
          filter="url(#bloom)"
          style="opacity: 0.9;" />

  <g filter="url(#bloom)">

    <line x1="165" y1="120" x2="166" y2="392"
          stroke="url(#glowGrad)" stroke-width="30" stroke-linecap="round" />

    <path d="M 256 256 L 358 125 M 256 256 L 358 387"
          fill="none"
          stroke="url(#glowGrad)"
          stroke-width="30"
          stroke-linecap="round"
          stroke-linejoin="round" />
  </g>
</svg>